name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install the full application stack so the dependency graph is validated on every
      # run, not just the handful of packages the tests import. The tests themselves do
      # not load any model, so nothing is downloaded from the model hub here.
      - name: Install dependencies
        run: pip install -r requirements.txt -r eval/requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q
